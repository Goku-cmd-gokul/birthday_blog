<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎉</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
transition:1s;
overflow:hidden;
}

.container{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:30px;
border-radius:20px;
text-align:center;
}

input{
padding:10px;
border:none;
border-radius:10px;
text-align:center;
letter-spacing:5px;
}

button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#ff4081;
color:white;
cursor:pointer;
}

#main{
display:none;
text-align:center;
color:white;
}

.wish{
position:fixed;
bottom:0;
right:20px;
background:#ff4081;
padding:10px;
border-radius:10px;
animation:float 5s linear forwards;
}

@keyframes float{
100%{transform:translateY(-300px);opacity:0;}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container" id="login">
<h2>Enter Secret 🔐</h2>
<input type="text" id="input" maxlength="4">
<br>
<button onclick="check()">Enter</button>
<p id="error" style="color:yellow;"></p>
</div>

<!-- MAIN -->
<div id="main">
<h1>🎉 Happy Birthday Pori Urundai 🎉</h1>
</div>

<!-- ✅ AUDIO -->
<audio id="bgMusic">
  <source src="pori.mp3" type="audio/mpeg">
</audio>

<script>

/* ONLY LORD INPUT */
let input=document.getElementById("input");
input.addEventListener("input",()=>{
input.value=input.value.replace(/[^lordLORD]/g,'');
});

/* ✅ BUTTON CLICK = AUDIO PLAY */
function check(){
let val=input.value.toLowerCase();

if(val==="lord"){

document.getElementById("login").style.display="none";
document.getElementById("main").style.display="block";

/* BACKGROUND IMAGE */
document.body.style.backgroundImage="url('20220529181654_IMG_0815.JPG')";
document.body.style.backgroundSize="cover";
document.body.style.backgroundPosition="center";
document.body.style.backgroundRepeat="no-repeat";

/* ✅ PLAY AUDIO HERE (WORKS IN MOBILE) */
let music = document.getElementById("bgMusic");
music.currentTime = 0;
music.play();

/* FLOATING WISHES */
setInterval(createWish,1500);

}else{
document.getElementById("error").innerText="Only LORD allowed!";
}
}

/* FLOATING WISH */
function createWish(){
let msgs=[
"Happy Birthday 🎉",
"Lord 🎂",
"Anna 💖",
"Enjoy 🥳",
"Stay Blessed 🔥"
];

let div=document.createElement("div");
div.className="wish";
div.innerText=msgs[Math.floor(Math.random()*msgs.length)];

document.body.appendChild(div);
setTimeout(()=>div.remove(),5000);
}

</script>

</body>
</html>
