<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎉</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
transition:1s;
}

/* LOGIN */
.container{
background: rgba(255,255,255,0.15);
backdrop-filter: blur(15px);
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

h2{color:#fff;}

input{
padding:12px;
border:none;
border-radius:10px;
text-align:center;
letter-spacing:5px;
font-size:18px;
outline:none;
}

button{
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:10px;
background:#ff4081;
color:#fff;
cursor:pointer;
transition:0.3s;
}

button:hover{transform:scale(1.1);}

#main{
display:none;
text-align:center;
color:#fff;
}

h1{
font-size:40px;
animation: glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px #fff;}
to{text-shadow:0 0 40px #ff4081;}
}

/* FLOATING WISH */
.wish{
position:fixed;
bottom:0;
right:20px;
background:#ff4081;
padding:10px;
border-radius:10px;
animation:floatUp 5s linear forwards;
}

@keyframes floatUp{
0%{transform:translateY(0);}
100%{transform:translateY(-300px);opacity:0;}
}
</style>
</head>

<body>

<div class="container" id="login">
<h2>Enter Secret 🔐</h2>
<input type="text" id="input" maxlength="4">
<br>
<button onclick="check()">Enter</button>
<p id="error" style="color:yellow;"></p>
</div>

<div id="main">
<h1>🎉 Happy Birthday LORD 🎉</h1>
</div>

<!-- AUDIO -->
<audio id="audio1" src="birthday.mp3"></audio>
<audio id="audio2" src="birthday.mp3"></audio>

<script>

/* ONLY LORD */
let input=document.getElementById("input");
input.addEventListener("input",()=>{
input.value=input.value.replace(/[^lordLORD]/g,'');
});

/* CHECK */
function check(){
let val=input.value.toLowerCase();

if(val==="lord"){

document.getElementById("login").style.display="none";
document.getElementById("main").style.display="block";

/* FIXED BACKGROUND */
document.body.style.backgroundImage="url('20220529181654_IMG_0815.JPG')";
document.body.style.backgroundSize="cover";
document.body.style.backgroundPosition="center";
document.body.style.backgroundRepeat="no-repeat";

/* MOBILE AUDIO FIX */
let a1=document.getElementById("audio1");
let a2=document.getElementById("audio2");

a1.play().then(()=>{
setTimeout(()=>{ a2.play(); },2000);
}).catch(()=>{
alert("Tap screen once for sound 🔊");
});

/* FLOATING */
setInterval(createWish,1500);

}else{
document.getElementById("error").innerText="Only LORD allowed!";
}
}

/* WISH */
function createWish(){
let msgs=[
"Happy Birthday 🎉",
"Bro 🎂",
"Anna 💖",
"Enjoy 🥳",
"Stay Blessed 🔥"
];

let div=document.createElement("div");
div.className="wish";
div.innerText=msgs[Math.floor(Math.random()*msgs.length)];

document.body.appendChild(div);
setTimeout(()=>div.remove(),5000);
}

</script>

</body>
</html>
